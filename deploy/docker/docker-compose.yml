# Docker Compose - Development Overlay
# Usage: docker compose -f docker-compose.common.yml -f docker-compose.yml up
# Source: packages/platform-core/src/config/services-definition.ts

services:
  system-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/system-service
        SERVICE_PORT: 3001
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/system-service/src:/app/src

  storage-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/storage-service
        SERVICE_PORT: 3002
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/storage-service/src:/app/src
      - storage-data:/app/storage

  user-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/user-service
        SERVICE_PORT: 3003
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/user-service/src:/app/src

  ai-config-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/ai-config-service
        SERVICE_PORT: 3004
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/ai-config-service/src:/app/src

  ai-content-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/ai-content-service
        SERVICE_PORT: 3005
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/ai-content-service/src:/app/src

  ai-analytics-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/ai-analytics-service
        SERVICE_PORT: 3006
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/ai-analytics-service/src:/app/src

  music-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/music-service
        SERVICE_PORT: 3007
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/music-service/src:/app/src

  api-gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE_PATH: packages/services/api-gateway
        SERVICE_PORT: 8080
    environment:
      NODE_ENV: development
    volumes:
      - ../../packages/services/api-gateway/src:/app/src

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: aiponge-jaeger
    ports:
      - '16686:16686'
      - '4318:4318'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - aiponge-network
    restart: unless-stopped
